<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePickr</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="logo.png">

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
<div class="app-container">

     <div class="app-container">
        
        <header class="top-nav">
            <div class="nav-left">
                <div class="logo">CINEPICKR</div>
                <nav class="nav-links">
                    <a href="#" class="active">Home</a>
                   
                </nav>
            </div>
            <div class="nav-right">
                
                <div class="avatar"> 
                    <ion-icon name="person-outline"></ion-icon> 
                </div> 
            </div>
        </header> 

        <main class="main-content">
            <section class="movies-section">
                <div class="controls-bar">
                    <div class="filters">
                        <span class="filter-label">FILTER BY:</span>
                        <div class="filter-dropdown">
                            <select id="genre-filter">
                                <option value="all">Genre</option>
                                <option value="action">Action</option>
                                <option value="comedy">Comedy</option>
                                <option value="drama">Drama</option>
                                <option value="sci-fi">Sci-Fi</option>
                                <option value="horror">Horror</option>
                            </select>
                        </div>
                        <div class="filter-dropdown">
                            <select id="type-filter">
                                <option value="all">Type</option>
                                <option value="movie">Movie</option>
                                <option value="series">Series</option>
                                <option value="episode">Episode</option>
                            </select>
                        </div>
                        <div class="filter-dropdown">
                            <select id="sort-select">
                                <option value="default">Sort By</option>
                                <option value="year-desc">Newest First</option>
                                <option value="year-asc">Oldest First</option>
                                <option value="title-asc">A-Z</option>
                                <option value="title-desc">Z-A</option>
                            </select>
                        </div>
                    </div>
                    
                </div>

                
                 <div id="movies-container" class="movies-grid">
                    <div class="empty-state">
                        <ion-icon name="film-outline"></ion-icon>
                        <h2>Welcome to CinePickr</h2>
                        <p>Search for a movie to start exploring.</p>
                    </div>
                </div>
                <div class="search-container">
                    <ion-icon name="search-outline" class="search-icon"></ion-icon> 
                    <input type="text" id="search-input" placeholder="Search movies...">
                </div>
            
 <div id="movie-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-modal-btn" class="close-btn"><ion-icon name="close-outline"></ion-icon></button>
            <div id="modal-body" class="modal-body">
                
            </div>
        </div>
    </div> 



<script src="script.js"></script>

</body>
</html>
